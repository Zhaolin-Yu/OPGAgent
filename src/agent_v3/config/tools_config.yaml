default_settings:
  timeout: 30
  retry_count: 3
  retry_delay: 1
tools:
  yolo_enumeration:
    name: YOLO tooth enumeration
    description: Use a YOLO model to enumerate teeth in an OPG panoramic radiograph
    service:
      host: localhost
      port: 8002
      base_url: http://localhost:8002
      env_type: uv
    endpoints:
      predict: /predict
      health: /health
      load_model: /load_model
      unload_model: /unload_model
    startup_script: tools/yolo_enumeration/start_api.sh
    gpu:
      device: 0
      memory_estimate: 2GB
    features:
      supports_unload: true
      supports_batch: false
    input:
      type: image
      formats:
      - jpg
      - jpeg
      - png
    output:
      type: json
      schema:
        boxes: list[dict]
  yolo_disease:
    name: YOLO disease detection
    description: Use a YOLO model to detect dental diseases in OPG panoramic radiographs
    service:
      host: localhost
      port: 8005
      base_url: http://localhost:8005
      env_type: uv
    endpoints:
      predict: /predict
      health: /health
      load_model: /load_model
      unload_model: /unload_model
    startup_script: tools/yolo_disease_detection/start_api.sh
    gpu:
      device: 0
      memory_estimate: 3GB
    features:
      supports_unload: true
      supports_batch: false
    input:
      type: image
      formats:
      - jpg
      - jpeg
      - png
    output:
      type: json
      schema:
        boxes: list[dict]
  tvem:
    name: TVEM MaskDINO detection
    description: High-precision dental image segmentation detection with a MaskDINO model; supports multiple detection tasks
    service:
      host: localhost
      port: 8003
      base_url: http://localhost:8003
      env_type: uv
    endpoints:
      health: /health
      models: /models
      detect: /detect/{model}
      load_model: /load/{model}
      unload_model: /unload/{model}
      unload_all: /unload_all
    startup_script: tools/TVEM/start_api.sh
    gpu:
      device: 1
      memory_estimate: 8-10GB per model
    features:
      supports_unload: true
      supports_batch: false
      multi_model: true
    available_models:
      4quadrants:
        description: Four-quadrant segmentation - detect upper-left, upper-right, lower-left, lower-right quadrants
        categories:
        - '1'
        - '2'
        - '3'
        - '4'
      11diseases:
        description: Detection of 11 disease classes - caries, implants, residual crowns, etc.
        categories:
        - Caries
        - Crown
        - Filling
        - Implant
        - Malaligned
        - Mandibular Canal
        - Missing teeth
        - Periapical lesion
        - Residual Crown
        - Retained root
        - maxillary sinus
      bone_loss:
        description: Bone loss detection
        categories:
        - Bone Loss
      mandibular_maxillary:
        description: Mandibular canal and maxillary sinus detection
        categories:
        - Mandibular Canal
        - maxillary sinus
    input:
      type: image
      formats:
      - jpg
      - jpeg
      - png
    output:
      type: json
      schema:
        model: str
        detections: list[dict]
        num_detections: int
        image_size: '[width, height]'
  oral_gpt:
    name: OralGPT-Omni analysis
    description: Multimodal dental diagnosis model
    service:
      host: localhost
      port: 8664
      base_url: http://localhost:8664
      env_type: uv
      load_balancing:
        enabled: true
        strategy: round_robin
        endpoints:
        - http://localhost:8664
        - http://localhost:8665
        - http://localhost:8666
        - http://localhost:8667
    endpoints:
      analyze: /analyze
      health: /health
    startup_script: tools/OralGPT-omni/start_api.sh
    gpu:
      device: 4
      memory_estimate: 10-12GB
      memory_per_replica: 12000
    replicas:
      enabled: true
      count: 4
      port_start: 8664
      port_end: 8667
    features:
      supports_unload: true
      supports_batch: false
    timeout: 90
    input:
      type: image
      formats:
      - jpg
      - jpeg
      - png
      additional_params:
        prompt: str
    output:
      type: json
      schema:
        analysis: str
  dental_gpt:
    name: DentalGPT analysis
    description: Specialized dental VLM analysis model that provides detailed diagnostic recommendations
    service:
      host: localhost
      port: 8566
      base_url: http://localhost:8566
      env_type: uv
      load_balancing:
        enabled: true
        strategy: round_robin
        endpoints:
        - http://localhost:8566
        - http://localhost:8567
        - http://localhost:8568
        - http://localhost:8569
    endpoints:
      analyze: /analyze
      health: /health
      load_model: /load_model
      unload_model: /unload_model
    startup_script: tools/dentalGPT/start_server.sh
    gpu:
      device: 0
      memory_estimate: 15-17GB
      memory_per_replica: 17000
    replicas:
      enabled: true
      count: 4
      port_start: 8566
      port_end: 8569
    features:
      supports_unload: true
      supports_batch: false
    timeout: 90
    input:
      type: image
      formats:
      - jpg
      - jpeg
      - png
      additional_params:
        question: str
    output:
      type: json
      schema:
        analysis: str
        diagnosis: list[dict]
  medsam:
    name: MedSAM segmentation
    description: Use MedSAM to precisely segment the target inside a given bbox
    service:
      host: localhost
      port: 8008
      base_url: http://localhost:8008
      env_type: uv
    endpoints:
      segment: /segment
      health: /health
    startup_script: tools/MedSAM/start_api.sh
    gpu:
      device: 0
      memory_estimate: 4GB
    features:
      supports_unload: true
      supports_batch: false
    input:
      type: image
      formats:
      - jpg
      - jpeg
      - png
      additional_params:
        bbox: str  # comma-separated x1,y1,x2,y2
    output:
      type: json
      schema:
        success: bool
        mask_contour: list[list[int]]
